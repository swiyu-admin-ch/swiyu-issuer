services:
  swiyu-issuer-service:
    image: swiyu-issuer:dhi-local
    build:
      context: .
      dockerfile: Dockerfile.dhi
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      EXTERNAL_URL: ${EXTERNAL_URL:-http://localhost:8080}
      SPRING_APPLICATION_NAME: ${SPRING_APPLICATION_NAME:-swiyu-issuer}
      ISSUER_ID: ${ISSUER_ID:-did:example:dummy}
      DID_STATUS_LIST_VERIFICATION_METHOD: ${DID_STATUS_LIST_VERIFICATION_METHOD:-did:example:dummy#assert-key-01}
      STATUS_LIST_KEY: ${STATUS_LIST_KEY:-}
      DID_SDJWT_VERIFICATION_METHOD: ${DID_SDJWT_VERIFICATION_METHOD:-did:example:dummy#assert-key-01}
      SDJWT_KEY: ${SDJWT_KEY:-}
      POSTGRES_USER: issuer_mgmt_user
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: issuer_db
      # Override spring.datasource.url from application-local.yml (which hardcodes localhost:5434
      # for IDE-based dev). Inside the container we must reach the postgres service by name.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/issuer_db

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: issuer_mgmt_user
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: issuer_db
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U issuer_mgmt_user -d issuer_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

