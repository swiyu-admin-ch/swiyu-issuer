# Dependabot version update configuration.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Update strategy per ecosystem:
#   • Weekly  → patch + minor (safe, auto-mergeable after CI)
#   • Monthly → major only    (breaking-change risk, requires deliberate review)

version: 2
updates:

  # ════════════════════════════════════════════════════════════════════════════
  # Maven – Weekly: patch + minor updates only
  # ════════════════════════════════════════════════════════════════════════════
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "patch-minor"
    commit-message:
      prefix: "chore(deps)"
    groups:
      spring:
        patterns:
          - "org.springframework*"  # Boot, Cloud, Statemachine, …
          - "org.springdoc*"
          - "org.apache.tomcat*"    # embedded Tomcat
        update-types: ["patch", "minor"]

      # Internal swiyu / Swiss e-ID libraries – all update types (no major-version risk gate)
      swiyu:
        patterns:
          - "ch.admin.*"
          - "io.github.swiyu*"

      cryptography:
        # Auth/encryption libs – silent API breaks possible; kept in their own PR
        patterns:
          - "org.bouncycastle*"
          - "com.nimbusds*"   # nimbus-jose-jwt
          - "com.authlete*"   # sd-jwt
        update-types: ["patch", "minor"]

      infrastructure:
        # DB drivers, migrations, networking, observability
        patterns:
          - "org.flywaydb*"
          - "org.postgresql*"
          - "org.hibernate*"
          - "io.micrometer*"
          - "io.prometheus*"
          - "io.zipkin*"            # Brave/Zipkin tracing bridge
          - "ch.qos.logback*"
          - "net.logstash*"
          - "io.netty*"
          - "com.squareup.okhttp3*"
          - "com.squareup.okio*"
        update-types: ["patch", "minor"]

      tooling:
        # Tests, build plugins, processors, utilities – catch-all
        patterns:
          - "*"
        update-types: ["patch", "minor"]

  # ════════════════════════════════════════════════════════════════════════════
  # Maven – Monthly: major updates only
  # ════════════════════════════════════════════════════════════════════════════
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "major-upgrade"
    commit-message:
      prefix: "chore(deps)!: MAJOR"
    groups:
      spring-major:
        patterns:
          - "org.springframework*"
          - "org.springdoc*"
          - "org.apache.tomcat*"
        update-types: ["major"]

      cryptography-major:
        patterns:
          - "org.bouncycastle*"
          - "com.nimbusds*"
          - "com.authlete*"
        update-types: ["major"]

      infrastructure-major:
        patterns:
          - "org.flywaydb*"
          - "org.postgresql*"
          - "org.hibernate*"
          - "io.micrometer*"
          - "io.prometheus*"
          - "io.zipkin*"
          - "ch.qos.logback*"
          - "net.logstash*"
          - "io.netty*"
          - "com.squareup.okhttp3*"
          - "com.squareup.okio*"
        update-types: ["major"]

      tooling-major:
        patterns:
          - "*"
        update-types: ["major"]

  # ════════════════════════════════════════════════════════════════════════════
  # Docker – Weekly: patch + minor / Monthly: major only
  # ════════════════════════════════════════════════════════════════════════════
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
      - "patch-minor"
    commit-message:
      prefix: "chore(deps)"
    groups:
      docker:
        patterns:
          - "*"
        update-types: ["patch", "minor"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"
      - "major-upgrade"
    commit-message:
      prefix: "chore(deps)!: MAJOR"
    groups:
      docker-major:
        patterns:
          - "*"
        update-types: ["major"]

  # ════════════════════════════════════════════════════════════════════════════
  # GitHub Actions – Weekly: patch + minor / Monthly: major only
  # ════════════════════════════════════════════════════════════════════════════
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
      - "patch-minor"
    commit-message:
      prefix: "chore(deps)"
    groups:
      actions:
        patterns:
          - "*"
        update-types: ["patch", "minor"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
      - "major-upgrade"
    commit-message:
      prefix: "chore(deps)!: MAJOR"
    groups:
      actions-major:
        patterns:
          - "*"
        update-types: ["major"]
