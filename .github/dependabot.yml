# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:

  # ════════════════════════════════════════════════════════════════════════════
  # Maven
  # ════════════════════════════════════════════════════════════════════════════
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      spring:
        patterns: &spring-patterns
          - "org.springframework*"  # Boot, Cloud, Statemachine, …
          - "org.springdoc*"
          - "org.apache.tomcat*"    # embedded Tomcat
        update-types: ["patch", "minor"]

      # Internal swiyu / Swiss e-ID libraries – all update types (no major-version risk gate)
      swiyu:
        patterns:
          - "ch.admin.*"
          - "io.github.swiyu*"

      cryptography:
        # Auth/encryption libs – silent API breaks possible; kept in their own PR
        patterns: &crypto-patterns
          - "org.bouncycastle*"
          - "com.nimbusds*"   # nimbus-jose-jwt
          - "com.authlete*"   # sd-jwt
        update-types: ["patch", "minor"]

      infrastructure:
        # DB drivers, migrations, networking, observability
        patterns: &infra-patterns
          - "org.flywaydb*"
          - "org.postgresql*"
          - "org.hibernate*"
          - "io.micrometer*"
          - "io.prometheus*"
          - "io.zipkin*"           # Brave/Zipkin tracing bridge
          - "ch.qos.logback*"
          - "net.logstash*"
          - "io.netty*"
          - "com.squareup.okhttp3*"
          - "com.squareup.okio*"
        update-types: ["patch", "minor"]

      tooling:
        # Tests, build plugins, processors, utilities – catch-all
        patterns: &tooling-patterns
          - "*"
        update-types: ["patch", "minor"]

  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      spring-major:
        patterns: *spring-patterns
        update-types: ["major"]
      cryptography-major:
        patterns: *crypto-patterns
        update-types: ["major"]
      infrastructure-major:
        patterns: *infra-patterns
        update-types: ["major"]
      tooling-major:
        patterns: *tooling-patterns
        update-types: ["major"]

  # ════════════════════════════════════════════════════════════════════════════
  # Docker
  # ════════════════════════════════════════════════════════════════════════════
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      docker:
        patterns: &all-patterns
          - "*"
        update-types: ["patch", "minor"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      docker-major:
        patterns: *all-patterns
        update-types: ["major"]

  # ════════════════════════════════════════════════════════════════════════════
  # GitHub Actions
  # ════════════════════════════════════════════════════════════════════════════
  - package-ecosystem: "github-actions"
    directory: "/"
    labels: ["dependencies", "github-actions"]
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: *all-patterns
        update-types: ["patch", "minor"]

  - package-ecosystem: "github-actions"
    directory: "/"
    labels: ["dependencies", "github-actions"]
    schedule:
      interval: "monthly"
    groups:
      actions-major:
        patterns: *all-patterns
        update-types: ["major"]
