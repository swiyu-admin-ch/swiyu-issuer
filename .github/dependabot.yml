# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "maven"
    # Single root directory: Dependabot discovers all pom.xml files recursively in a
    # multi-module Maven project. Specifying sub-directories separately causes duplicate
    # PRs for the same dependency (once per manifest), so we only scan from the root.
    directory: "/"
    groups:
      # ── Group 1 ──────────────────────────────────────────────────────────────
      # Spring ecosystem (patch + minor only; major Spring updates require manual review)
      spring:
        patterns:
          - "org.springframework*"   # covers org.springframework, org.springframework.boot,
                                     # org.springframework.cloud, org.springframework.statemachine, …
          - "org.springdoc*"
          - "org.apache.tomcat*"     # embedded Tomcat shipped with Spring Boot
        update-types:
          - "patch"
          - "minor"

      # ── Group 2 ──────────────────────────────────────────────────────────────
      # Internal swiyu / Swiss e-ID ecosystem libraries
      swiyu:
        patterns:
          - "ch.admin.*"
          - "io.github.swiyu*"

      # ── Group 3 ──────────────────────────────────────────────────────────────
      # Security-sensitive libraries: changes here can silently break auth/encryption
      # and must be reviewed carefully → kept in their own PR.
      cryptography:
        patterns:
          - "org.bouncycastle*"
          - "com.nimbusds*"   # nimbus-jose-jwt (was incorrectly "com.nimbus*" before)
          - "com.authlete*"   # sd-jwt library

      # ── Group 4 ──────────────────────────────────────────────────────────────
      # Infrastructure: database drivers/migrations, networking, and observability.
      # These sit below the business logic and are low-risk to batch together.
      infrastructure:
        patterns:
          - "org.flywaydb*"
          - "org.postgresql*"
          - "org.hibernate*"
          - "io.micrometer*"
          - "io.prometheus*"
          - "io.zipkin*"             # Brave/Zipkin bridge used by micrometer-tracing
          - "ch.qos.logback*"
          - "net.logstash*"
          - "io.netty*"
          - "com.squareup.okhttp3*"
          - "com.squareup.okio*"

      # ── Group 5 ──────────────────────────────────────────────────────────────
      # Tooling & testing: never production-critical; safe to batch into one PR.
      tooling:
        patterns:
          - "org.testcontainers*"
          - "com.tngtech.archunit*"
          - "org.mock-server*"
          - "org.mockito*"
          - "org.projectlombok*"
          - "net.javacrumbs.shedlock*"
          - "net.java.dev.jna*"            # JNA – required by swiyu-did-resolver-adapter
          - "com.github.ben-manes.caffeine*"
          - "org.jetbrains*"
          - "org.apache.commons*"
          - "com.jayway.jsonpath*"
          - "net.minidev*"                 # transitive via Nimbus/Spring Security

    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"