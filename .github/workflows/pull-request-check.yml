name: Pull Request Check
run-name: ${{ github.repository }} is evaluating pull request
on: [ pull_request ]

# Cancel superseded runs on the same PR to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this PR check builds, scans and loads (does not push) a local
# image, and uploads SARIF. It does not publish packages or create attestations.
permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  docker-security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          languages: java
          config-file: ./.github/codeql/codeql-config.yml
      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: Build & test with Maven (produce JaCoCo)
        run: mvn --batch-mode clean verify -DskipTests=false
      - name: Upload JaCoCo reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jacoco-reports
          path: |
            verifier-service/target/site/jacoco/jacoco.xml
            verifier-service/target/site/jacoco/index.html
            verifier-application/target/site/jacoco/jacoco.xml
            verifier-application/target/site/jacoco/index.html
      - name: Setup Node.js (for coverage summary script)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      - name: Add coverage to summary
        run: node .github/scripts/coverage-summary.js
        #CodeQL and PMD analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          category: "/language:java"
      - name: Run PMD static analysis
        uses: pmd/pmd-github-action@d9c1f3c5940cbf5923f1354e83fa858b4496ebaa # v2
        id: pmd
        with:
          rulesets: '.github/rulesets/java/pmd_omni_ruleset.xml'
      - name: Upload PMD SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          sarif_file: pmd-report.sarif
      - name: Run Snyk to check for vulnerabilities 🔍
        uses: snyk/actions/maven-3-jdk-21@8e119fbb6c251787721d34ba683ed48eba792766 # master
        continue-on-error: false
        env:
          JAVA_HOME: '' # Snyk action sets JAVA_HOME to a path that is not compatible with the setup-java action, so we need to reset it here
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_API: https://api.eu.snyk.io
          SNYK_ORG: ${{ secrets.SNYK_ORG }}
        with:
          # report only vulnerabilities with level high or critical, as we want to avoid noise in the PR checks
          args: --maven-aggregate-project --severity-threshold=high --sarif-file-output=snyk.sarif
      - name: Upload result as sarif to GitHub Code Scanning 📦
        if: always() # We want to upload the SARIF file even if the Snyk action fails, to have the results in the Code Scanning tab of GitHub
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          sarif_file: snyk.sarif
      # Build and scan both image variants on every PR so a regression
      # in either Dockerfile is caught before merge. The hardened dhi.io image is
      # the default published variant; the UBI image is published under -unhardened
      # during the transition period. Both must succeed for the PR to be mergeable.

      - name: Build hardened (default) docker image
        id: build-dhi
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          load: true
          pull: true # Prevent old images to be used, which may trigger CVE findings
          tags: pull_request_check:latest
          file: Dockerfile.dhi

      - name: Scan hardened Docker image with Snyk 🐳
        uses: snyk/actions/docker@master
        continue-on-error: false
        with:
          # report only vulnerabilities with level high or critical, as we want to avoid noise in the PR checks
          image: pull_request_check:latest
          args: --file=Dockerfile.dhi --severity-threshold=high --exclude-base-image-vulns
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_API: https://api.eu.snyk.io
          SNYK_ORG: ${{ secrets.SNYK_ORG }}

      - name: Build unhardened docker image
        id: build-unhardened
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          pull: true
          tags: pull_request_check:unhardened
          build-args: SOURCE_IMAGE=eclipse-temurin:21-jre-ubi9-minimal
          file: Dockerfile

      - name: Scan unhardened Docker image with Snyk 🐳
        uses: snyk/actions/docker@8e119fbb6c251787721d34ba683ed48eba792766 # master
        continue-on-error: false
        with:
          image: pull_request_check:unhardened
          args: --file=Dockerfile --severity-threshold=high --exclude-base-image-vulns
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_API: https://api.eu.snyk.io
          SNYK_ORG: ${{ secrets.SNYK_ORG }}
      - name: Generate OpenAPI spec
        run: mvn -B clean verify -P generate-doc -DskipTests
      - name: Ensure spec is committed
        run: |
          git diff --exit-code -- openapi.yaml || (
            echo "openapi.yaml is outdated. Run: mvn verify -P generate-doc and commit the updated file."
            exit 1
          )